<div class="form-card">
  <h2 class="form-title">
    <span class="form-icon">➕</span> New Vehicle Entry
  </h2>

  <form (ngSubmit)="onSubmit()" #entryForm="ngForm">
    <div class="form-grid">

      <div class="form-group">
        <label for="licensePlate">License Plate *</label>
        <input
          id="licensePlate"
          type="text"
          [(ngModel)]="licensePlate"
          name="licensePlate"
          placeholder="e.g. DL01AB1234"
          class="form-input"
          maxlength="20"
          autocomplete="off"
          required
        />
      </div>

      <div class="form-group">
        <label for="vehicleType">Vehicle Type *</label>
        <select id="vehicleType" [(ngModel)]="vehicleType" name="vehicleType" class="form-select">
          <option *ngFor="let type of vehicleTypes" [value]="type">{{ type }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="vehicleCategory">Category</label>
        <select id="vehicleCategory" [(ngModel)]="vehicleCategory" name="vehicleCategory" class="form-select">
          <option *ngFor="let cat of vehicleCategories" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" [(ngModel)]="status" name="status" class="form-select">
          <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
        </select>
      </div>

    </div>

    <div class="fee-preview">
      <span class="fee-label">Estimated Fee:</span>
      <span class="fee-amount">${{ estimatedFee.toFixed(2) }}</span>
      <span *ngIf="vehicleCategory === 'Official/Government'" class="fee-badge">Gov / Free</span>
    </div>

    <div *ngIf="errorMessage" class="alert alert-error">⚠️ {{ errorMessage }}</div>
    <div *ngIf="successMessage" class="alert alert-success">✅ {{ successMessage }}</div>

    <button type="submit" class="btn-submit" [disabled]="isSubmitting">
      <span *ngIf="!isSubmitting">🚗 Record Entry</span>
      <span *ngIf="isSubmitting">Processing...</span>
    </button>
  </form>
</div>
